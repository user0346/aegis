name: Secret Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Run AEGIS secret_scan.py
        run: python3 tools/secret_scan.py --all

      # Defense-in-depth ist abgedeckt durch:
      #   - AEGIS secret_scan.py (oben, mit forbidden-dir + gitignore-aware)
      #   - GitHub Native Secret-Scanning (aktiviert via enable_repo_security.py)
      #   - Push-Protection (blockiert bekannte Provider-Tokens schon im push)
      #   - CodeQL Static Analysis (separater Workflow)
      # TruffleHog war redundant + flaky → entfernt.
