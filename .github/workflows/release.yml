name: Release AEGIS

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write     # für GitHub-Release-Upload + gh-pages-Push
  id-token: write     # für OIDC → Sigstore keyless signing
  pages: write        # gh-pages Manifest-Deploy

jobs:
  build-and-sign:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Build AEGIS.zip
        run: python tools/build_release.py

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign AEGIS.zip with Sigstore (keyless)
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          cosign sign-blob \
            --yes \
            --output-signature AEGIS.zip.sig \
            --output-certificate AEGIS.zip.crt \
            AEGIS.zip

      - name: Verify signature locally
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          cosign verify-blob \
            --certificate AEGIS.zip.crt \
            --signature AEGIS.zip.sig \
            --certificate-identity-regexp "^https://github.com/${{ github.repository }}/\.github/workflows/release\.yml@refs/tags/v.*" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            AEGIS.zip

      - name: Compute SHA256
        id: hash
        run: |
          SHA=$(sha256sum AEGIS.zip | cut -d' ' -f1)
          echo "sha256=$SHA" >> $GITHUB_OUTPUT

      - name: Create Release with all assets
        uses: softprops/action-gh-release@v3
        with:
          files: |
            AEGIS.zip
            AEGIS.zip.sig
            AEGIS.zip.crt
          body: |
            ## AEGIS ${{ github.ref_name }}

            Autonomer Endpoint-Schutz für Windows — überwacht Dateien, Prozesse, Netzwerk, USB & Treiber, komplementär zu Windows Defender. Security-Ops-Dashboard, lernende Baseline, Full-System-Scan mit Quarantäne.

            ### Verification
            ```
            cosign verify-blob \
              --certificate AEGIS.zip.crt \
              --signature AEGIS.zip.sig \
              --certificate-identity-regexp "^https://github.com/${{ github.repository }}/\.github/workflows/release\.yml@refs/tags/v.*" \
              --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
              AEGIS.zip
            ```

            ### SHA-256
            `${{ steps.hash.outputs.sha256 }}`

            ### Auto-Update
            AEGIS-Clients with `update_github_repo=${{ github.repository }}` pull this within 24h.

      - name: Update manifest on gh-pages
        run: |
          mkdir -p public
          cat > public/manifest.json <<EOF
          {
            "latest_version": "${{ github.ref_name }}",
            "released_at": "$(date -u +%FT%TZ)",
            "sha256": "${{ steps.hash.outputs.sha256 }}",
            "download_url": "https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/AEGIS.zip",
            "signature_url": "https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/AEGIS.zip.sig",
            "certificate_url": "https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/AEGIS.zip.crt",
            "rekor_index_search": "https://search.sigstore.dev/?hash=${{ steps.hash.outputs.sha256 }}"
          }
          EOF

      - name: Deploy manifest to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          keep_files: true

  # Baut die direkt ausfuehrbare AEGIS.exe (onedir) auf Windows, signiert das
  # Bundle keyless mit Sigstore und haengt es an dasselbe Release. Der In-App-
  # Updater einer gefrorenen .exe zieht GENAU dieses Asset (AEGIS-windows-x64.zip).
  build-exe-windows:
    runs-on: windows-latest
    needs: build-and-sign        # Release existiert bereits -> Assets nur anhaengen
    permissions:
      contents: write
      id-token: write            # OIDC -> Sigstore keyless
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Install dependencies + PyInstaller
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements_v2.txt pyinstaller

      - name: Build AEGIS.exe (onedir)
        run: python tools/build_exe.py

      - name: Zip exe bundle (top-level AEGIS/)
        shell: pwsh
        run: Compress-Archive -Path dist/AEGIS -DestinationPath AEGIS-windows-x64.zip -Force

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign bundle with Sigstore (keyless)
        shell: bash
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          cosign sign-blob \
            --yes \
            --output-signature AEGIS-windows-x64.zip.sig \
            --output-certificate AEGIS-windows-x64.zip.crt \
            AEGIS-windows-x64.zip

      - name: Verify bundle signature locally
        shell: bash
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          cosign verify-blob \
            --certificate AEGIS-windows-x64.zip.crt \
            --signature AEGIS-windows-x64.zip.sig \
            --certificate-identity-regexp "^https://github.com/${{ github.repository }}/\.github/workflows/release\.yml@refs/tags/v.*" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            AEGIS-windows-x64.zip

      - name: Attach bundle to the release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.ref_name }}" \
            AEGIS-windows-x64.zip \
            AEGIS-windows-x64.zip.sig \
            AEGIS-windows-x64.zip.crt \
            --clobber
