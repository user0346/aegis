<!DOCTYPE html><html lang="de"><head><meta charset="utf-8"><title>AEGIS Guard</title>
<style>
:root{--bg:#080b12;--panel:rgba(255,255,255,.05);--line:rgba(255,255,255,.09);--acc:#38bdf8;--txt:#e7eef7;--muted:#8595ad;--crit:#f87171;--warn:#fbbf24;--ok:#34d399}
html,body{margin:0;width:300px;background:var(--bg);color:var(--txt);font:13px/1.5 system-ui,"Segoe UI",sans-serif}
.head{display:flex;align-items:center;gap:10px;padding:13px 15px;border-bottom:1px solid var(--line)}
.mark{width:26px;height:26px}
.head h1{margin:0;font-size:14px;letter-spacing:2px}
.head .sub{font-size:10px;color:var(--muted)}
.pill{margin-left:auto;font-size:10px;font-weight:700;letter-spacing:1px;color:var(--ok);border:1px solid rgba(52,211,153,.4);background:rgba(52,211,153,.08);padding:3px 10px;border-radius:999px}
.grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;padding:14px 15px 12px}
.stat{background:var(--panel);border:1px solid var(--line);border-radius:9px;padding:11px 6px;text-align:center}
.stat .v{font-size:22px;font-weight:700;font-family:ui-monospace,Consolas,monospace}
.stat .l{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-top:3px}
.v-crit{color:var(--crit)}.v-warn{color:var(--warn)}.v-acc{color:var(--acc)}
.conn{padding:0 15px 12px;display:flex;flex-direction:column;gap:6px}
.conn-row{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--txt)}
.dot{width:8px;height:8px;border-radius:50%;flex:0 0 auto;background:#475569;transition:background .2s}
.dot.on{background:var(--ok);box-shadow:0 0 6px rgba(52,211,153,.7)}
.dot.off{background:#475569}
.conn-state{margin-left:auto;font-weight:600;font-size:11px}
.s-on{color:var(--ok)}.s-off{color:var(--muted)}
.info{padding:0 15px 12px;font-size:12px;color:var(--muted)}
.exc{padding:0 15px 12px}
.exc-head{display:flex;align-items:center;font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:7px}
.exc-head button{margin-left:auto;font:inherit;font-size:10px;text-transform:none;letter-spacing:0;color:var(--crit);background:rgba(248,113,113,.08);border:1px solid rgba(248,113,113,.35);border-radius:7px;padding:2px 9px;cursor:pointer}
.exc-head button:hover{background:rgba(248,113,113,.18)}
.exc-row{display:flex;align-items:center;gap:8px;background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:6px 10px;margin-bottom:5px}
.exc-row span{font-family:ui-monospace,Consolas,monospace;font-size:12px;color:var(--warn);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.exc-row button{margin-left:auto;flex:0 0 auto;width:22px;height:22px;border-radius:6px;border:1px solid var(--line);background:transparent;color:var(--muted);cursor:pointer;font-size:12px;line-height:1}
.exc-row button:hover{color:var(--crit);border-color:rgba(248,113,113,.5)}
.foot{padding:9px 15px;border-top:1px solid var(--line);font-size:10px;color:var(--muted)}
</style></head><body>
<div class="head"><img class="mark" src="icons/icon-48.png" alt="">
<div><h1>AEGIS</h1><div class="sub">Guard</div></div><div class="pill">AKTIV</div></div>
<div class="grid">
<div class="stat"><div class="v v-warn" id="s-warned">0</div><div class="l">Gewarnt</div></div>
<div class="stat"><div class="v v-crit" id="s-dl">0</div><div class="l">Downloads</div></div>
<div class="stat"><div class="v v-acc" id="s-block">0</div><div class="l">Blocklist</div></div>
</div>
<div class="conn">
  <div class="conn-row"><span class="dot" id="d-bridge"></span>Browser-Brücke<span class="conn-state s-off" id="t-bridge">…</span></div>
  <div class="conn-row"><span class="dot" id="d-service"></span>Desktop-Service<span class="conn-state s-off" id="t-service">…</span></div>
</div>
<div class="info">Schützt vor IP-Loggern, Phishing-URLs &amp; Risiko-Downloads. Verdächtige Links werden auf jeder Seite markiert.</div>
<div class="exc" id="exc-wrap" style="display:none">
  <div class="exc-head">Erlaubte Ausnahmen <button id="exc-clear">alle entfernen</button></div>
  <div id="exc-list"></div>
</div>
<div class="foot">AEGIS Guard 2.4.0 · komplementär zur Desktop-App</div>
<script src="popup.js"></script></body></html>
